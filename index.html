<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Angelina — Trancoso, Bahia</title>

  <!-- Página provisória: não indexar -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Casa Angelina — hospedagem em Trancoso, Bahia. Nosso novo site está chegando. Enquanto isso, reserve sua estadia." />
  <meta name="theme-color" content="#1d2a24" />

  <!-- Open Graph -->
  <meta property="og:title" content="Casa Angelina — Trancoso, Bahia" />
  <meta property="og:description" content="Nosso novo site está chegando. Enquanto isso, reserve sua estadia." />
  <meta property="og:image" content="images/casa3.png" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="images/casa3.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #f5efe4;
      --ink: #1d2a24;
      --gold: #c9a86a;
      --blue: #4a6f8a;
      --line: rgba(245, 239, 228, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: 'Jost', sans-serif;
      color: var(--cream);
      background: var(--ink);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      position: relative;
      min-height: 100svh;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    /* --- Background video --- */
    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 70% 60% at 50% 50%, rgba(15, 22, 18, 0.45) 0%, rgba(15, 22, 18, 0) 70%),
        linear-gradient(180deg, rgba(15, 22, 18, 0.55) 0%, rgba(15, 22, 18, 0.32) 42%, rgba(15, 22, 18, 0.72) 100%);
    }

    /* --- Content --- */
    .content {
      position: relative;
      z-index: 2;
      max-width: 680px;
      animation: rise 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .kicker {
      font-size: clamp(0.72rem, 1.6vw, 0.85rem);
      letter-spacing: 0.42em;
      text-transform: uppercase;
      font-weight: 400;
      color: var(--cream);
      opacity: 0.85;
      margin-bottom: 1.4rem;
    }

    .kicker::before,
    .kicker::after {
      content: "";
      display: inline-block;
      width: 28px;
      height: 1px;
      background: var(--gold);
      vertical-align: middle;
      margin: 0 0.9em;
      opacity: 0.8;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(3rem, 11vw, 6.5rem);
      line-height: 0.95;
      letter-spacing: 0.01em;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.15rem, 3.2vw, 1.6rem);
      opacity: 0.92;
      margin-top: 1.1rem;
    }

    .sub {
      font-size: clamp(0.92rem, 2vw, 1.02rem);
      font-weight: 300;
      line-height: 1.7;
      opacity: 0.82;
      margin-top: 1.5rem;
      max-width: 30em;
      margin-left: auto;
      margin-right: auto;
    }

    /* --- Buttons --- */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      justify-content: center;
      margin-top: 2.6rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.85rem 1.6rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--cream);
      text-decoration: none;
      font-size: 0.86rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 400;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.06);
      transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    .btn svg { width: 17px; height: 17px; fill: currentColor; }

    .btn:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.14);
      border-color: var(--cream);
    }

    .btn--primary {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--ink);
      font-weight: 500;
    }

    .btn--primary:hover {
      background: #d9bc83;
      border-color: #d9bc83;
      color: var(--ink);
    }

    /* --- Footer note --- */
    .note {
      position: absolute;
      bottom: 1.6rem;
      left: 0;
      right: 0;
      z-index: 2;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 540px) {
      .actions { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
      .kicker::before, .kicker::after { width: 18px; margin: 0 0.6em; }
    }

    @media (prefers-reduced-motion: reduce) {
      .content { animation: none; }
    }
  </style>
</head>
<body>

    <div class="overlay"></div>

    </div>

  </main>

  <script>
    // Escolhe o vídeo de fundo conforme o tamanho da tela (evita baixar os dois).
    (function () {
      var v = document.getElementById('bgVideo');
      var isMobile = window.matchMedia('(max-width: 768px)').matches;
      v.src = isMobile ? 'videos/video-mobile.mp4' : 'videos/video-desktop.mp4';
      var play = v.play();
      if (play && play.catch) { play.catch(function () {}); }
    })();
  </script>
